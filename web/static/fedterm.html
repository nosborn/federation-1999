<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedTerm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css" integrity="sha512-XpXUuzg5afNt1bsgnrOesXP70TLH8tXYYK5sK+Y0UV+YBvJn9EfRFYWy4HT3TVDfH0nl1CO0lwOxIrt2gk9qjg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style type="text/css">
      html, body {
        height:100%;
        margin:0;
        background: #0b0b0b;
        color:#ddd;
        font-family: system-ui,Segoe UI,Roboto,Helvetica,Arial;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #terminal {
        flex: 1;
      }
      #input-bar {
        background: #111;
        border-top: 1px solid #222;
        display: flex;
        gap: 6px;
        padding: 6px;
      }
      #command {
        background: #000;
        border: 1px solid #333;
        color: #fff;
        flex:1;
        font-family: monospace;
        outline: none;
        padding: 8px;
      }
      #status {
        align-self: center;
        color: #bbb;
        font-size: 13px;
        min-width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="terminal"></div>
      <div id="input-bar">
        <input id="command" type="text" autocomplete="off" placeholder="Type command and press Enter">
        <div id="status">Disconnected</div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.js" integrity="sha512-Gujw5GajF5is3nMoGv9X+tCMqePLL/60qvAv1LofUZTV9jK8ENbM9L+maGmOsNzuZaiuyc/fpph1KT9uR5w3CQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="text/javascript">
      (() => {
        const WS_URL = "wss://federation-1999.fly.dev/play";
        const IAC = 255, DONT = 254, DO = 253, WONT = 252, WILL = 251, SB = 250, SE = 240;
        const NAWS = 31;

        const term = new Terminal({cursorInactiveStyle: "none", fontFamily: "monospace", fontSize: 14});
        term.open(document.getElementById('terminal'));
        // term.clear();

        const statusEl = document.getElementById('status');
        const input = document.getElementById('command');

        // history
        const history = [];
        let historyIdx = -1;

        // websocket + telnet logic
        let socket = null;

        function setStatus(s) {
          statusEl.textContent = s;
        }

        function connect() {
          setStatus("Connecting...");
          try {
            socket = new WebSocket(WS_URL);
          } catch (e) {
            term.writeln("\r\n*** WebSocket constructor failed: " + String(e));
            setStatus("Error");
            return;
          }
          socket.binaryType = "arraybuffer";

          socket.addEventListener('open', () => {
            term.writeln("\r\n*** Connected to " + WS_URL);
            setStatus("Connected");
            sendNAWS();
          });

          socket.addEventListener('message', (evt) => {
            const raw = new Uint8Array(evt.data);
            const text = handleTelnetFrame(raw);
            if (text) term.write(text);
          });

          socket.addEventListener('close', (evt) => {
            term.writeln("\r\n*** Connection closed");
            setStatus("Disconnected");
            socket = null;
          });

          socket.addEventListener('error', (evt) => {
            term.writeln("\r\n*** WebSocket error");
            setStatus("Error");
          });
        }

        // send IAC bytes helper
        function sendIAC(bytes) {
          if (!socket || socket.readyState !== WebSocket.OPEN) return;
          socket.send(new Uint8Array(bytes));
        }

        // send NAWS (cols, rows)
        function sendNAWS() {
          if (!socket || socket.readyState !== WebSocket.OPEN) return;
          const cols = term.cols || 80;
          const rows = term.rows || 24;
          const payload = new Uint8Array([
            IAC, SB, NAWS,
            (cols >> 8) & 0xff, cols & 0xff,
            (rows >> 8) & 0xff, rows & 0xff,
            IAC, SE
          ]);
          socket.send(payload);
        }

        term.onResize(({ cols, rows }) => {
          sendNAWS();
        });

        // Telnet parsing & negotiation:
        // - Accept WILL/DO by replying DO/WILL respectively (agree),
        // - Convert IAC IAC -> single 0xFF byte in output,
        // - Skip subnegotiations (SB ... SE), but if server asks DO NAWS we WILL and send size,
        // - Return the text to pass to terminal (decoded as UTF-8).
        function handleTelnetFrame(buf) {
          const outBytes = [];
          for (let i = 0; i < buf.length; i++) {
            const b = buf[i];
            if (b === IAC) {
              const next = buf[i + 1];
              if (next === undefined) break; // truncated; ignore
              // Escaped 255 => IAC IAC = data 255
              if (next === IAC) {
                outBytes.push(IAC);
                i += 1; // consumed two
                continue;
              }
              // Subnegotiation: IAC SB ... IAC SE
              if (next === SB) {
                // find terminating IAC SE
                let j = i + 2;
                let found = false;
                for (; j < buf.length - 1; j++) {
                  if (buf[j] === IAC && buf[j + 1] === SE) { found = true; break; }
                }
                if (found) {
                  // optional: inspect subnegotiation content if needed
                  // skip up to and including IAC SE
                  i = j + 1;
                  continue;
                } else {
                  // incomplete subnegotiation in this frame; drop remainder
                  break;
                }
              }

              // otherwise it's a 3-byte negotiation: IAC <cmd> <opt>
              const cmd = buf[i + 1];
              const opt = buf[i + 2];
              if (cmd === undefined || opt === undefined) break;
              // Respond as "agree" strategy, but handle NAWS specially
              switch (cmd) {
                case WILL: // server says "I will do option" -> we reply DO
                  sendIAC([IAC, DO, opt]);
                  break;
                case WONT: // server says "I won't" -> reply DONT
                  sendIAC([IAC, DONT, opt]);
                  break;
                case DO: // server asks us to DO opt -> reply WILL (agree)
                  if (opt === NAWS) {
                    // agree then send NAWS subnegotiation with size
                    sendIAC([IAC, WILL, opt]);
                    // small delay not necessary; send NAWS immediately
                    sendNAWS();
                  } else {
                    sendIAC([IAC, WILL, opt]);
                  }
                  break;
                case DONT:
                  sendIAC([IAC, WONT, opt]);
                  break;
                default:
                  // unknown command; refuse
                  sendIAC([IAC, DONT, opt]);
                  break;
              }
              i += 2; // skip the command and option
              continue;
            } else {
              // normal data byte
              outBytes.push(b);
            }
          }

          if (outBytes.length === 0) return "";
          try {
            // decode as UTF-8; typical telnet text is ASCII/ANSI which decodes fine
            const decoded = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(outBytes));
            return decoded;
          } catch (e) {
            // fallback to Latin-1-ish decode
            let s = "";
            for (let i = 0; i < outBytes.length; i++) s += String.fromCharCode(outBytes[i]);
            return s;
          }
        }

        // Input handling
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const cmd = input.value;
            if (!cmd && socket && socket.readyState === WebSocket.OPEN) {
              // send CRLF if empty line as well (some prompts expect)
              socket.send(new Uint8Array([13,10]));
              input.value = "";
              historyIdx = -1;
              return;
            }
            if (socket && socket.readyState === WebSocket.OPEN) {
              // Send CRLF (telnet expects CRLF)
              const payload = new TextEncoder().encode(cmd + "\r\n");
              socket.send(payload);
            } else {
              term.writeln("\r\n*** Not connected. Press Enter with empty input to try reconnect.");
            }
            // push into history (ignore empty)
            if (cmd.trim() !== "") {
              history.unshift(cmd);
              if (history.length > 200) history.pop();
            }
            historyIdx = -1;
            input.value = "";
          } else if (e.key === "ArrowUp") {
            // history navigation
            e.preventDefault();
            if (history.length === 0) return;
            historyIdx = Math.min(historyIdx + 1, history.length - 1);
            input.value = history[historyIdx];
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (history.length === 0) return;
            historyIdx = historyIdx <= 0 ? -1 : historyIdx - 1;
            input.value = historyIdx === -1 ? "" : history[historyIdx];
          }
        });

        // connect on load
        connect();

        // allow reconnect by clicking status
        statusEl.addEventListener('click', () => {
          if (!socket) connect();
        });

        // initial message
        term.writeln("*** Web Telnet client (NAWS enabled).");
        term.writeln("*** Connecting to: " + WS_URL);
        term.writeln("");

      })();
    </script>
  </body>
</html>
