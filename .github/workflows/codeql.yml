# yamllint disable rule:line-length
---
name: CodeQL Advanced

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: 41 0 * * 2

permissions:
  packages: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    if: github.event.repository.name != 'private-federation-1999'
    name: Analyze (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup git-crypt
        uses: flydiverny/setup-git-crypt@6a4a2d2457663c0b7648d31203305a8e75a20d6f # v4

      - name: Unlock the repository
        run: |
          echo '${{ secrets.GIT_CRYPT_KEY_B64 }}' | base64 -d >git-crypt-key
          git-crypt unlock git-crypt-key
          rm git-crypt-key

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@d3678e237b9c32a6c9bffb3315c335f976f3549f # v3.30.2
        with:
          build-mode: manual
          languages: go
          queries: security-extended,security-and-quality

      - run: |-
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@d3678e237b9c32a6c9bffb3315c335f976f3549f # v3.30.2
        with:
          category: /language:go
