LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so
LoadModule authz_host_module /usr/lib/apache2/modules/mod_authz_host.so
LoadModule deflate_module /usr/lib/apache2/modules/mod_deflate.so
LoadModule dir_module /usr/lib/apache2/modules/mod_dir.so
LoadModule filter_module /usr/lib/apache2/modules/mod_filter.so
LoadModule mime_module /usr/lib/apache2/modules/mod_mime.so
LoadModule mpm_event_module /usr/lib/apache2/modules/mod_mpm_event.so
LoadModule perl_module /usr/lib/apache2/modules/mod_perl.so
LoadModule reqtimeout_module /usr/lib/apache2/modules/mod_reqtimeout.so
LoadModule status_module /usr/lib/apache2/modules/mod_status.so

AccessFileName .htaccess
AddOutputFilterByType DEFLATE text/css text/html text/plain
DefaultRuntimeDir /run/apache2
DefaultType text/html
DirectoryIndex index.cgi index.html index.pl
ErrorLog /dev/stderr
Group www-data
HostnameLookups Off
KeepAlive On
KeepAliveTimeout 5
Listen 8080
LogFormat "apache2[%P]: %h %l %u %t \"%r\" %>s %B \"%{Referer}i\" \"%{User-Agent}i\"" combined
LogLevel error
MaxConnectionsPerChild 0
MaxKeepAliveRequests 100
MaxRequestWorkers 150
MaxSpareThreads 75
MinSpareThreads 25
PidFile /run/apache2/apache2.pid
RequestReadTimeout body=10,minrate=500
RequestReadTimeout header=20-40,minrate=500
ServerSignature Off
ServerTokens Prod
StartServers 1
ThreadLimit 64
ThreadsPerChild 25
Timeout 300
TraceEnable Off
User www-data

AddType text/css .css
AddType text/html .html
AddType text/plain .txt
TypesConfig /etc/mime.types

<Directory />
	Options FollowSymLinks
	AllowOverride None
	Require all denied
</Directory>

# <Directory /usr/share>
# 	AllowOverride None
# 	Require all granted
# </Directory>

<Directory /var/www/>
	Options Indexes FollowSymLinks
	AllowOverride None
	Require all granted
</Directory>

<FilesMatch "^\.ht">
	Require all denied
</FilesMatch>

<Location /server-status>
        SetHandler server-status
        Require local
	Require ip 172.19.0.0/16
	Require ip 192.168.215.0/24
</Location>

<VirtualHost *:8080>
	CustomLog /dev/stdout combined
	DocumentRoot /var/www/html
	ErrorLog /dev/stderr
	ServerAdmin webmaster@localhost
	ServerName federation-1999.fly.dev
</VirtualHost>

# vim: noet ts=8 sw=8
